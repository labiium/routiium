name: Publish npm package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v0.2.0'
        required: true
        type: string

concurrency:
  group: publish-npm-${{ github.ref }}-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify:
    name: Verify package metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          CARGO_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $VERSION does not match package.json $PACKAGE_VERSION" >&2
            exit 1
          fi
          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "Tag version $VERSION does not match Cargo.toml $CARGO_VERSION" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify npm package metadata
        run: npm run package:verify

      - name: npm pack dry run
        env:
          ROUTIIUM_NPM_SKIP_DOWNLOAD: '1'
          ROUTIIUM_NPM_SKIP_BUILD: '1'
        run: npm pack --dry-run

  build-binaries:
    name: Build ${{ matrix.triple }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
            binary: routiium
          - os: ubuntu-24.04-arm
            triple: aarch64-unknown-linux-gnu
            binary: routiium
          - os: macos-13
            triple: x86_64-apple-darwin
            binary: routiium
          - os: macos-14
            triple: aarch64-apple-darwin
            binary: routiium
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
            binary: routiium.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-on-failure: true

      - name: Build release binary
        run: cargo build --release --locked

      - name: Stage release asset
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.binary }}" "dist/routiium-${{ matrix.triple }}${{ matrix.binary == 'routiium.exe' && '.exe' || '' }}"
          chmod +x dist/routiium-*

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify.outputs.tag }}
          files: dist/routiium-*
          fail_on_unmatched_files: true

  publish:
    name: Publish routiium to npm
    needs: [verify, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify package metadata
        run: npm run package:verify

      - name: Check whether this npm version already exists
        id: npm_version
        shell: bash
        run: |
          if npm view "routiium@${{ needs.verify.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "routiium@${{ needs.verify.outputs.version }} is already published; skipping npm publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package with npm trusted publishing (OIDC)
        if: steps.npm_version.outputs.exists != 'true'
        run: npm publish --access public
